<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="calc-form">
        <div>
            <label for="first-number">First Number:</label><br>
            <input type="number" id="first-number" name="first-number" required>
        </div>
        <br>
        <div>
          <label for="second-number">Second Number:</label><br>
          <input type="number" id="second-number" name="second-number" required>
        </div>
        <br>
        <div>
             <button type="button" id="btn-plus" class="plus">+</button>
             <button type="button" id="btn-minus" class="minus">-</button>
             <button type="button" id="btn-multi" class="multi">x</button>
             <button type="button" id="btn-divi" class="divi">÷</button>
        </div>
    </form>

    <h2>Resultado: <span id="result"></span> </h2>

    <script src="script.js"></script>
</body>
</html>
